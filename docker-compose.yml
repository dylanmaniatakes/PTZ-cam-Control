services:
  ptz-cam-control:
    build:
      context: .
    image: ptz-cam-control:latest
    container_name: ptz-cam-control
    restart: unless-stopped
    ports:
      - "${PTZ_HTTP_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      AUTO_RECONNECT_MS: ${AUTO_RECONNECT_MS:-5000}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-}
    volumes:
      - ./data:/app/data
